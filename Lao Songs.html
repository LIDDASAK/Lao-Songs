      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Phetsarath OT", "Lao UI", Arial, sans-serif;
        background: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }
      .player-container {
        max-width: 700px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 25px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      .header {
        text-align: center;
        padding: 15px 0;
        border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        margin-bottom: 20px;
      }
      .header h1 {
        font-size: 1.4rem;
        margin-bottom: 10px;
      }
      .search-box {
        display: flex;
        gap: 10px;
        margin: 15px 0;
      }
      .search-box input {
        flex: 1;
        padding: 10px 15px;
        border: none;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        font-size: 1rem;
      }
      .search-box input::placeholder {
        color: #a0d2ff;
      }
      .search-box button {
        padding: 10px 20px;
        background: #e94560;
        border: none;
        border-radius: 25px;
        color: #fff;
        cursor: pointer;
        transition: 0.3s;
      }
      .search-box button:hover {
        background: #ff6b6b;
      }

      .now-playing {
        text-align: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 15px;
        margin-bottom: 20px;
      }
      .album-art {
        width: 160px;
        height: 160px;
        margin: 0 auto 15px;
        background: linear-gradient(45deg, #e94560, #0f3460);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        animation: rotate 20s linear infinite;
        animation-play-state: paused;
      }
      .album-art.playing {
        animation-play-state: running;
      }
      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .song-title {
        font-size: 1.2rem;
        font-weight: bold;
        margin: 10px 0 5px;
      }
      .song-artist {
        color: #a0d2ff;
        font-size: 1rem;
      }
      .song-album {
        color: #888;
        font-size: 0.9rem;
      }

      .progress-container {
        margin: 20px 0;
        padding: 0 10px;
      }
      .progress-bar {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 3px;
        cursor: pointer;
        position: relative;
      }
      .progress {
        height: 100%;
        background: #e94560;
        border-radius: 3px;
        width: 0%;
        transition: width 0.1s;
      }
      .time-display {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        color: #a0d2ff;
        margin-top: 5px;
      }

      .main-controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        padding: 15px 0;
      }
      .btn {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: #fff;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        font-size: 1.2rem;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.1);
      }
      .btn-play {
        width: 65px;
        height: 65px;
        background: #e94560;
        font-size: 1.5rem;
      }
      .btn-play:hover {
        background: #ff6b6b;
        transform: scale(1.15);
      }

      .volume-control {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 0;
        justify-content: center;
      }
      .volume-control input {
        width: 100px;
        cursor: pointer;
      }

      .playlist-section {
        margin-top: 25px;
        border-top: 2px solid rgba(255, 255, 255, 0.2);
        padding-top: 20px;
      }
      .playlist-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        flex-wrap: wrap;
        gap: 10px;
      }
      .playlist-header h3 {
        font-size: 1.2rem;
      }
      .playlist-actions button {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: #fff;
        padding: 8px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.85rem;
        margin-left: 5px;
        transition: 0.3s;
      }
      .playlist-actions button:hover {
        background: #e94560;
      }

      .playlist {
        max-height: 350px;
        overflow-y: auto;
        border-radius: 10px;
      }
      .playlist::-webkit-scrollbar {
        width: 6px;
      }
      .playlist::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      .playlist::-webkit-scrollbar-thumb {
        background: #e94560;
        border-radius: 3px;
      }

      .song-item {
        padding: 12px 15px;
        margin: 5px 0;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .song-item:hover {
        background: rgba(233, 69, 96, 0.3);
      }
      .song-item.active {
        background: #e94560;
        border-left: 4px solid #fff;
      }
      .song-item .song-info {
        flex: 1;
        min-width: 0;
      }
      .song-item .song-title {
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .song-item .song-artist {
        font-size: 0.85rem;
        color: #a0d2ff;
      }
      .song-item .song-album {
        font-size: 0.8rem;
        color: #888;
      }
      .song-item .song-duration {
        color: #888;
        font-size: 0.9rem;
        padding-left: 10px;
        white-space: nowrap;
      }

      .loading,
      .empty,
      .no-results {
        text-align: center;
        padding: 30px;
        color: #a0d2ff;
      }

      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #4caf50;
        color: white;
        padding: 12px 25px;
        border-radius: 30px;
        font-size: 0.95rem;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 1000;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }
      .toast.show {
        opacity: 1;
      }
      .toast.error {
        background: #f44336;
      }

      @media (max-width: 480px) {
        .player-container {
          padding: 15px;
        }
        .header h1 {
          font-size: 1.1rem;
        }
        .album-art {
          width: 140px;
          height: 140px;
          font-size: 2.5rem;
        }
        .btn {
          width: 45px;
          height: 45px;
        }
        .btn-play {
          width: 55px;
          height: 55px;
        }
        .playlist-header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>

    <div class="player-container">
      <div class="header">
        <h1>🎵 ເພງລາວອັດຕະໂນມັດ</h1>
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="🔍 ຄົ້ນຫາເພງ, ນັກຮ້ອງ..."
          />
          <button onclick="searchSongs()">ຄົ້ນຫາ</button>
        </div>
        <div
          style="
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 0.9rem;
            color: #a0d2ff;
          "
        >
          <span
            id="autoPlayToggle"
            style="
              cursor: pointer;
              padding: 5px 10px;
              border-radius: 15px;
              background: rgba(255, 255, 255, 0.1);
            "
            onclick="toggleAutoPlay()"
            >🔄 ເລ່ນອັດຕະໂນມັດ: ເປີດ</span
          >
          <span
            id="repeatToggle"
            style="
              cursor: pointer;
              padding: 5px 10px;
              border-radius: 15px;
              background: rgba(255, 255, 255, 0.1);
            "
            onclick="toggleRepeat()"
            >🔁 ຊ້ຳ: ເປີດ</span
          >
        </div>
      </div>

      <div class="now-playing">
        <div class="album-art" id="albumArt">🎵</div>
        <div class="song-title" id="currentTitle">ກຳລັງໂຫຼດເພງ...</div>
        <div class="song-artist" id="currentArtist">Lao Music Collection</div>
        <div class="song-album" id="currentAlbum">Album</div>
      </div>

      <div class="progress-container">
        <div class="progress-bar" id="progressBar">
          <div class="progress" id="progress"></div>
        </div>
        <div class="time-display">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>

      <div class="main-controls">
        <button class="btn" id="prevBtn" title="ເພງກ່ອນ">⏮</button>
        <button class="btn btn-play" id="playBtn" title="ເລ່ນ/ຢຸດ">▶</button>
        <button class="btn" id="nextBtn" title="ເພງຖັດໄປ">⏭</button>
      </div>

      <div class="volume-control">
        <span>🔊</span>
        <input
          type="range"
          id="volumeSlider"
          min="0"
          max="1"
          step="0.1"
          value="0.8"
        />
      </div>

      <div class="playlist-section">
        <div class="playlist-header">
          <h3>📋 ລາຍການເພງ <span id="songCount">(0)</span></h3>
          <div class="playlist-actions">
            <button onclick="shuffleSongs()">🔀 ສະຫຼັບ</button>
            <button onclick="copyPlaylist()">🔗 ຄັດລອກ</button>
          </div>
        </div>
        <div class="playlist" id="playlist">
          <div class="loading">ກຳລັງໂຫຼດລາຍຊື່ເພງ...</div>
        </div>
      </div>
    </div>

    <audio id="audioPlayer" preload="metadata"></audio>

          title: "ລາກ່ອນທີ່ຮັກ",
          artist: "ໄກສີ ວັງເວີນໂຂງ - V. KAISY",
          album: "ຊຸດ: ສິ່ງສຳຄັນ",
          src: "https://lao-online.com/all_files/medias/mp3/039_AVSEQ11.mp3",
          year: "2009",
        },

      ];

      // 🎛️ ຕົວແປຫຼັກ
      const audio = document.getElementById("audioPlayer");
      const playBtn = document.getElementById("playBtn");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const progressBar = document.getElementById("progressBar");
      const progress = document.getElementById("progress");
      const currentTimeEl = document.getElementById("currentTime");
      const durationEl = document.getElementById("duration");
      const volumeSlider = document.getElementById("volumeSlider");
      const playlistEl = document.getElementById("playlist");
      const songCountEl = document.getElementById("songCount");
      const albumArt = document.getElementById("albumArt");
      const toast = document.getElementById("toast");
      const searchInput = document.getElementById("searchInput");

      let currentSongIndex = 0;
      let isPlaying = false;
      let isAutoPlay = true;
      let isRepeat = true;
      let isShuffled = false;
      let songs = [...laoSongs];
      let originalSongs = [...laoSongs];

      // ⚙️ ເລີ່ມຕົ້ນ
      function init() {
        audio.volume = volumeSlider.value;
        renderPlaylist();
        loadSong(currentSongIndex);
        setupEventListeners();
        showToast("ຍິນດີຕ້ອນຮັບ! 🇱🇦🎵", "success");
      }

      // 🔍 ຄົ້ນຫາເພງ
      function searchSongs() {
        const query = searchInput.value.toLowerCase().trim();
        if (!query) {
          songs = [...originalSongs];
        } else {
          songs = originalSongs.filter(
            (song) =>
              song.title.toLowerCase().includes(query) ||
              song.artist.toLowerCase().includes(query) ||
              song.album.toLowerCase().includes(query),
          );
        }
        currentSongIndex = 0;
        renderPlaylist();
        if (songs.length > 0) {
          loadSong(0);
          showToast(`ພົບ ${songs.length} ເພງ ✅`, "success");
        } else {
          showToast("ບໍ່ພົບເພງທີ່ຄົ້ນຫາ ❌", "error");
          playlistEl.innerHTML =
            '<div class="no-results">😔 ບໍ່ພົບເພງທີ່ຄົ້ນຫາ</div>';
        }
      }

      // 🎨 ສ້າງລາຍການເພງ
      function renderPlaylist() {
        playlistEl.innerHTML = "";
        songCountEl.textContent = `(${songs.length})`;

        if (songs.length === 0) {
          playlistEl.innerHTML = '<div class="empty">ບໍ່ມີເພງໃນລາຍການ</div>';
          return;
        }

        songs.forEach((song, index) => {
          const item = document.createElement("div");
          item.className = `song-item ${index === currentSongIndex ? "active" : ""}`;
          item.innerHTML = `
                    <div class="song-info">
                        <div class="song-title">${index + 1}. ${song.title}</div>
                        <div class="song-artist">${song.artist}</div>
                        <div class="song-album">${song.album}${song.year ? " • " + song.year : ""}</div>
                    </div>
                    <span class="song-duration">🎧</span>
                `;
          item.onclick = () => {
            currentSongIndex = index;
            loadSong(currentSongIndex);
            playSong();
          };
          playlistEl.appendChild(item);
        });
      }

      // 🎵 ໂຫຼດເພງ
      function loadSong(index) {
        if (!songs[index]) return;
        const song = songs[index];
        audio.src = song.src;
        document.getElementById("currentTitle").textContent = song.title;
        document.getElementById("currentArtist").textContent = song.artist;
        document.getElementById("currentAlbum").textContent =
          song.album || "Lao Music";

        document.querySelectorAll(".song-item").forEach((item, i) => {
          item.classList.toggle("active", i === index);
        });
      }

      // ▶️ ເລ່ນເພງ
      function playSong() {
        audio
          .play()
          .then(() => {
            isPlaying = true;
            playBtn.textContent = "⏸";
            albumArt.classList.add("playing");
          })
          .catch((err) => {
            console.log("Playback error:", err);
            showToast("⚠️ ບາງເພງອາດບໍ່ສາມາດເລ່ນໄດ້ໂດຍກົງ", "error");
          });
      }

      // ⏸️ ຢຸດເພງ
      function pauseSong() {
        audio.pause();
        isPlaying = false;
        playBtn.textContent = "▶";
        albumArt.classList.remove("playing");
      }

      // ⏭️ ເພງຖັດໄປ
      function nextSong() {
        if (isShuffled) {
          currentSongIndex = Math.floor(Math.random() * songs.length);
        } else {
          currentSongIndex = (currentSongIndex + 1) % songs.length;
        }
        loadSong(currentSongIndex);
        if (isPlaying || isAutoPlay) playSong();
      }

      // ⏮️ ເພງກ່ອນ
      function prevSong() {
        currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
        loadSong(currentSongIndex);
        if (isPlaying || isAutoPlay) playSong();
      }

      // 🔄 ອັບເດດ progress bar
      function updateProgress(e) {
        const { duration, currentTime } = e.srcElement;
        if (duration) {
          const percent = (currentTime / duration) * 100;
          progress.style.width = `${percent}%`;
          currentTimeEl.textContent = formatTime(currentTime);
          durationEl.textContent = formatTime(duration);
        }
      }

      // ⏱️ ປ່ຽນເວລາເປັນຮູບແບບ mm:ss
      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, "0")}`;
      }

      // 🎚️ ຕັ້ງຄ່າ progress ຈາກການຄລິກ
      function setProgress(e) {
        const width = this.clientWidth;
        const clickX = e.offsetX;
        const duration = audio.duration;
        if (duration) audio.currentTime = (clickX / width) * duration;
      }

      // 🔊 ປັບສຽງ
      function setVolume() {
        audio.volume = volumeSlider.value;
      }

      // 🔄 ສິ້ນສຸດເພງ
      function handleSongEnd() {
        if (isRepeat) {
          nextSong();
        } else if (currentSongIndex < songs.length - 1) {
          nextSong();
        } else {
          pauseSong();
          if (isAutoPlay) {
            currentSongIndex = 0;
            loadSong(0);
            playSong();
          }
        }
      }

      // 🔀 ສັບລາຍການ
      function shuffleSongs() {
        isShuffled = !isShuffled;
        if (isShuffled) {
          for (let i = songs.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [songs[i], songs[j]] = [songs[j], songs[i]];
          }
          currentSongIndex = 0;
          loadSong(0);
        } else {
          songs = [...originalSongs];
          loadSong(currentSongIndex);
        }
        renderPlaylist();
        showToast(
          isShuffled ? "🔀 ສັບລາຍການແລ້ວ" : "📋 ກັບຄືນລຳດັບເດີມ",
          "success",
        );
      }

      // 🔗 ຄັດລອກລິ້ງເພງ
      function copyPlaylist() {
        const song = songs[currentSongIndex];
        if (song) {
          navigator.clipboard.writeText(song.src).then(() => {
            showToast("🔗 ຄັດລອກລິ້ງເພງແລ້ວ!", "success");
          });
          window.open(song.src, "_blank");
        }
      }

      // 🔄 ສະຫຼັບ AutoPlay
      function toggleAutoPlay() {
        isAutoPlay = !isAutoPlay;
        const el = document.getElementById("autoPlayToggle");
        el.textContent = `🔄 ເລ່ນອັດຕະໂນມັດ: ${isAutoPlay ? "ເປີດ" : "ປິດ"}`;
        el.style.background = isAutoPlay ? "#e94560" : "rgba(255,255,255,0.1)";
      }

      // 🔁 ສະຫຼັບ Repeat
      function toggleRepeat() {
        isRepeat = !isRepeat;
        const el = document.getElementById("repeatToggle");
        el.textContent = `🔁 ຊ້ຳ: ${isRepeat ? "ເປີດ" : "ປິດ"}`;
        el.style.background = isRepeat ? "#e94560" : "rgba(255,255,255,0.1)";
      }

      // 💬 ສະແດງ toast
      function showToast(message, type = "success") {
        toast.textContent = message;
        toast.className = `toast show ${type === "error" ? "error" : ""}`;
        setTimeout(() => toast.classList.remove("show"), 2500);
      }

      // 🔗 ຕິດ Event Listeners
      function setupEventListeners() {
        playBtn.onclick = () => (isPlaying ? pauseSong() : playSong());
        prevBtn.onclick = prevSong;
        nextBtn.onclick = nextSong;

        audio.addEventListener("timeupdate", updateProgress);
        audio.addEventListener("ended", handleSongEnd);
        audio.addEventListener("loadedmetadata", () => {
          durationEl.textContent = formatTime(audio.duration);
        });

        progressBar.onclick = setProgress;
        volumeSlider.oninput = setVolume;
        searchInput.addEventListener("keypress", (e) => {
          if (e.key === "Enter") searchSongs();
        });

        // ຄີຍ໌ລັດ
        document.addEventListener("keydown", (e) => {
          if (e.code === "Space" && e.target.tagName !== "INPUT") {
            e.preventDefault();
            isPlaying ? pauseSong() : playSong();
          }
          if (e.code === "ArrowRight") nextSong();
          if (e.code === "ArrowLeft") prevSong();
        });
      }

      // 🚀 ເລີ່ມເຄື່ອງ!
      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
